<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Startup Tycoon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2236;--border:#1e293b;
  --text:#e2e8f0;--text-dim:#64748b;--cyan:#06d6a0;--purple:#a855f7;
  --pink:#ec4899;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
}
html{font-size:16px}
body{
  font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}

.top-nav{
  padding:14px 24px;background:rgba(6,214,160,.08);border-bottom:1px solid var(--border);
  font-size:1.1rem;font-weight:700;
}
.top-nav a{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:10px;
  background:rgba(6,214,160,.12);color:var(--cyan);
  transition:background .2s;
}
.top-nav a:hover{background:rgba(6,214,160,.22);text-decoration:none}

header{
  text-align:center;padding:28px 20px 18px;
  background:linear-gradient(180deg,rgba(168,85,247,.1) 0%,transparent 100%);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  background-color:rgba(10,14,23,.85);
}
header h1{
  font-size:1.8rem;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:6px;
}
header h1 span{font-size:1.4rem;margin-right:6px}
.stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.stat{text-align:center}
.stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.stat-value{font-size:1.4rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--cyan)}
.stat-value.persec{color:var(--purple);font-size:1rem}

main{max-width:720px;margin:0 auto;padding:20px 16px 80px}

.business-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;margin-bottom:14px;
  transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.business-card:hover{border-color:rgba(6,214,160,.3);box-shadow:0 0 20px rgba(6,214,160,.05)}
.business-card.locked .biz-top{opacity:.4;filter:grayscale(.5)}
.business-card.locked .progress-wrap{opacity:.3}
.lock-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.8rem;color:var(--amber);font-weight:700;font-family:'JetBrains Mono',monospace;
  background:rgba(245,158,11,.1);padding:4px 12px;border-radius:8px;margin-bottom:8px;
}

.biz-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.biz-icon{
  font-size:2rem;width:52px;height:52px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface2);flex-shrink:0;
}
.biz-info{flex:1;min-width:0}
.biz-name{font-weight:700;font-size:1rem;margin-bottom:2px}
.biz-detail{font-size:.75rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.biz-level{
  font-size:.7rem;background:var(--surface2);color:var(--cyan);
  padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap;
}

.progress-wrap{
  height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:14px;
}
.progress-bar{
  height:100%;border-radius:99px;width:0%;
  transition:width .08s linear;
}
.progress-bar.running{background:linear-gradient(90deg,var(--cyan),var(--purple))}
.progress-bar.idle{background:var(--text-dim);width:0%}

.biz-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  border:none;border-radius:10px;padding:9px 16px;font-size:.78rem;
  font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;
  transition:transform .1s,box-shadow .15s,opacity .15s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-buy{background:linear-gradient(135deg,#065f46,#047857);color:#6ee7b7}
.btn-buy:not(:disabled):hover{box-shadow:0 0 16px rgba(6,214,160,.3)}
.btn-run{background:linear-gradient(135deg,#1e1b4b,#3730a3);color:#a5b4fc}
.btn-run:not(:disabled):hover{box-shadow:0 0 16px rgba(99,102,241,.3)}
.btn-manager{background:linear-gradient(135deg,#581c87,#7e22ce);color:#d8b4fe}
.btn-manager:not(:disabled):hover{box-shadow:0 0 16px rgba(168,85,247,.3)}
.btn-manager.owned{background:#1a0a2e;color:var(--purple);cursor:default;opacity:.7}

.btn .cost{font-family:'JetBrains Mono',monospace;font-size:.72rem;opacity:.85}

.float-text{
  position:fixed;pointer-events:none;font-weight:700;font-size:1.1rem;
  font-family:'JetBrains Mono',monospace;color:var(--cyan);z-index:999;
  animation:floatUp .9s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(.7)}
}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--purple);border-radius:10px;
  padding:10px 20px;font-size:.82rem;color:var(--purple);font-weight:600;
  z-index:1000;animation:toastIn .3s ease-out;pointer-events:none;
}
@keyframes toastIn{
  0%{opacity:0;transform:translateX(-50%) translateY(20px)}
  100%{opacity:1;transform:translateX(-50%) translateY(0)}
}

.win-overlay{
  position:fixed;inset:0;background:rgba(10,14,23,.92);z-index:2000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  animation:fadeIn .5s ease-out;
}
.win-overlay h2{
  font-size:2.4rem;font-weight:900;
  background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:10px;
}
.win-overlay p{color:var(--text-dim);font-size:1rem;margin-bottom:24px}
.win-overlay .btn{font-size:1rem;padding:12px 28px}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}

footer{
  text-align:center;padding:20px;font-size:.7rem;color:var(--text-dim);
}

@media(max-width:500px){
  header h1{font-size:1.3rem}
  .stats{gap:16px}
  .stat-value{font-size:1.1rem}
  .biz-actions{flex-direction:column}
  .btn{width:100%;justify-content:center}
}
</style>
</head>
<body>

<nav class="top-nav"><a href="fromscratch.html">&larr; Back to Scratch Page</a></nav>

<header>
  <h1><span>&#x1F916;</span> AI Startup Tycoon</h1>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Funding</div>
      <div class="stat-value" id="totalMoney">$0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Revenue / sec</div>
      <div class="stat-value persec" id="perSec">$0/s</div>
    </div>
    <div class="stat">
      <div class="stat-label">Lifetime</div>
      <div class="stat-value persec" id="lifetime">$0</div>
    </div>
  </div>
</header>

<main id="gameArea"></main>

<footer>AI Startup Tycoon &mdash; an idle clicker game</footer>

<script>
(function(){
"use strict";

var BUSINESSES = [
  {id:"codebot",  name:"Code Bot",        emoji:"\u{1F916}", baseCost:10,      baseIncome:1,    baseTime:1000, managerCost:100},
  {id:"scraper",  name:"Data Scraper",     emoji:"\u{1F577}\uFE0F", baseCost:100,     baseIncome:5,    baseTime:2000, managerCost:1000},
  {id:"chatbot",  name:"Chat Assistant",   emoji:"\u{1F4AC}", baseCost:1000,    baseIncome:25,   baseTime:3000, managerCost:12000},
  {id:"imagegen", name:"Image Generator",  emoji:"\u{1F3A8}", baseCost:10000,   baseIncome:100,  baseTime:4500, managerCost:150000},
  {id:"agent",    name:"AI Agent",         emoji:"\u{1F9E0}", baseCost:100000,  baseIncome:500,  baseTime:6000, managerCost:1500000},
  {id:"agi",      name:"AGI Research Lab", emoji:"\u{1F52C}", baseCost:1000000, baseIncome:5000, baseTime:8000, managerCost:15000000}
];

var COST_MULT = 1.15;
var SPEED_LEVELS = [25, 50, 100, 150, 200];
var WIN_AMOUNT = 1e11;

var state = getDefaultState();

function getDefaultState(){
  return {
    money: 0,
    lifetimeMoney: 0,
    businesses: BUSINESSES.map(function(b){
      return { id: b.id, level: b.id === "codebot" ? 1 : 0, hasManager: false, progress: 0, running: false };
    }),
    won: false
  };
}

function getBizState(id){ return state.businesses.find(function(b){return b.id===id;}); }
function getBizDef(id){ return BUSINESSES.find(function(b){return b.id===id;}); }

function getCost(def, level){
  if(level === 0) return def.baseCost;
  return Math.floor(def.baseCost * Math.pow(COST_MULT, level));
}

function getIncome(def, level){
  if(level <= 0) return 0;
  return def.baseIncome * level * (1 + (level - 1) * 0.04);
}

function getCycleTime(def, level){
  var t = def.baseTime;
  for(var i = 0; i < SPEED_LEVELS.length; i++){
    if(level >= SPEED_LEVELS[i]) t *= 0.8;
    else break;
  }
  return Math.max(t, 500);
}

function getTotalPerSec(){
  var total = 0;
  for(var i = 0; i < BUSINESSES.length; i++){
    var b = BUSINESSES[i];
    var bs = getBizState(b.id);
    if(bs.level > 0 && bs.hasManager){
      total += getIncome(b, bs.level) / (getCycleTime(b, bs.level) / 1000);
    }
  }
  return total;
}

function formatMoney(n){
  if(n < 0) return "-" + formatMoney(-n);
  if(n < 1000) return "$" + Math.floor(n).toLocaleString();
  var suffixes = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc"];
  var tier = 0, scaled = n;
  while(scaled >= 1000 && tier < suffixes.length - 1){ scaled /= 1000; tier++; }
  return "$" + scaled.toFixed(scaled < 10 ? 2 : scaled < 100 ? 1 : 0) + suffixes[tier];
}

function saveGame(){
  try{ localStorage.setItem("aiStartupTycoon", JSON.stringify(state)); }catch(e){}
}

function loadGame(){
  try{
    var raw = localStorage.getItem("aiStartupTycoon");
    if(!raw) return;
    var saved = JSON.parse(raw);
    state.money = saved.money || 0;
    state.lifetimeMoney = saved.lifetimeMoney || 0;
    state.won = saved.won || false;
    var sb = saved.businesses || [];
    for(var i = 0; i < sb.length; i++){
      var bs = getBizState(sb[i].id);
      if(bs){
        bs.level = sb[i].level || 0;
        bs.hasManager = sb[i].hasManager || false;
        bs.progress = 0;
        bs.running = bs.hasManager && bs.level > 0;
      }
    }
  }catch(e){ state = getDefaultState(); }
}

var gameArea = document.getElementById("gameArea");
var totalMoneyEl = document.getElementById("totalMoney");
var perSecEl = document.getElementById("perSec");
var lifetimeEl = document.getElementById("lifetime");

var cards = {};

function buildUI(){
  gameArea.innerHTML = "";
  for(var i = 0; i < BUSINESSES.length; i++){
    var b = BUSINESSES[i];
    var bs = getBizState(b.id);
    var card = document.createElement("div");
    card.className = "business-card" + (bs.level === 0 ? " locked" : "");
    card.setAttribute("data-id", b.id);

    var lockHtml = bs.level === 0
      ? '<div class="lock-badge">\u{1F512} Unlock for ' + formatMoney(b.baseCost) + '</div>'
      : '';

    var runBtnHtml = '';
    if(b.id === "codebot"){
      runBtnHtml = '<button class="btn btn-run" data-run>\u26A1 Collect</button>';
    } else if(!bs.hasManager){
      runBtnHtml = '<button class="btn btn-run" data-run>\u25B6 Run</button>';
    }

    card.innerHTML =
      '<div class="biz-top">' +
        '<div class="biz-icon">' + b.emoji + '</div>' +
        '<div class="biz-info">' +
          '<div class="biz-name">' + b.name + '</div>' +
          '<div class="biz-detail" data-detail>Lvl <span data-level>' + bs.level + '</span> &middot; <span data-income>' + formatMoney(getIncome(b, bs.level)) + '</span>/cycle</div>' +
        '</div>' +
        '<div class="biz-level" data-levelBadge>Lv ' + bs.level + '</div>' +
      '</div>' +
      '<div class="progress-wrap"><div class="progress-bar ' + (bs.running ? "running" : "idle") + '" data-progress></div></div>' +
      lockHtml +
      '<div class="biz-actions">' +
        runBtnHtml +
        '<button class="btn btn-buy" data-buy>\u2B06 ' + (bs.level === 0 ? 'Unlock' : 'Upgrade') + ' <span class="cost" data-buyCost>' + formatMoney(getCost(b, bs.level)) + '</span></button>' +
        '<button class="btn btn-manager ' + (bs.hasManager ? "owned" : "") + '" data-manager ' + (bs.hasManager ? "disabled" : "") + '>' +
          (bs.hasManager ? '\u2705 Manager' : '\u{1F454} Manager <span class="cost" data-managerCost>' + formatMoney(b.managerCost) + '</span>') +
        '</button>' +
      '</div>';

    gameArea.appendChild(card);

    var runBtn = card.querySelector("[data-run]");
    var buyBtn = card.querySelector("[data-buy]");
    var managerBtn = card.querySelector("[data-manager]");

    if(runBtn) runBtn.addEventListener("click", (function(bid){ return function(e){ startBusiness(bid, e); }; })(b.id));
    buyBtn.addEventListener("click", (function(bid){ return function(){ buyUpgrade(bid); }; })(b.id));
    if(managerBtn && !bs.hasManager) managerBtn.addEventListener("click", (function(bid){ return function(){ buyManager(bid); }; })(b.id));

    cards[b.id] = {
      card: card,
      progressBar: card.querySelector("[data-progress]"),
      levelSpan: card.querySelector("[data-level]"),
      incomeSpan: card.querySelector("[data-income]"),
      levelBadge: card.querySelector("[data-levelBadge]"),
      buyCostSpan: card.querySelector("[data-buyCost]"),
      lockBadge: card.querySelector(".lock-badge"),
      runBtn: runBtn,
      buyBtn: buyBtn,
      managerBtn: managerBtn,
      managerCostSpan: card.querySelector("[data-managerCost]")
    };
  }
}

function startBusiness(id, event){
  var bs = getBizState(id);
  var def = getBizDef(id);
  if(bs.level <= 0 || bs.running) return;
  bs.running = true;
  bs.progress = 0;
  var c = cards[id];
  if(c.progressBar) c.progressBar.className = "progress-bar running";
  if(id === "codebot" && event){
    spawnFloatText(event.clientX, event.clientY, "+" + formatMoney(getIncome(def, bs.level)));
  }
}

function collectIncome(id){
  var bs = getBizState(id);
  var def = getBizDef(id);
  var inc = getIncome(def, bs.level);
  state.money += inc;
  state.lifetimeMoney += inc;
  bs.running = false;
  bs.progress = 0;
  if(bs.hasManager) bs.running = true;
}

function buyUpgrade(id){
  var bs = getBizState(id);
  var def = getBizDef(id);
  var cost = getCost(def, bs.level);
  if(state.money < cost) return;
  state.money -= cost;
  bs.level++;

  if(bs.level === 1 && bs.hasManager) bs.running = true;

  refreshCard(id);
  showToast(def.emoji + " " + def.name + " " + (bs.level === 1 ? "unlocked!" : "upgraded to Lv " + bs.level + "!"));
  saveGame();
}

function buyManager(id){
  var bs = getBizState(id);
  var def = getBizDef(id);
  if(state.money < def.managerCost || bs.hasManager) return;
  state.money -= def.managerCost;
  bs.hasManager = true;
  if(bs.level > 0) bs.running = true;
  refreshCard(id);
  showToast("\u{1F454} Manager hired for " + def.name + "!");
  saveGame();
}

function refreshCard(id){
  var bs = getBizState(id);
  var def = getBizDef(id);
  var c = cards[id];
  if(!c) return;

  if(bs.level > 0){
    c.card.classList.remove("locked");
    if(c.lockBadge){ c.lockBadge.remove(); c.lockBadge = null; }
    if(c.buyBtn) c.buyBtn.innerHTML = "\u2B06 Upgrade <span class='cost' data-buyCost>" + formatMoney(getCost(def, bs.level)) + "</span>";
  }

  if(c.levelSpan) c.levelSpan.textContent = bs.level;
  if(c.incomeSpan) c.incomeSpan.textContent = formatMoney(getIncome(def, bs.level));
  if(c.levelBadge) c.levelBadge.textContent = "Lv " + bs.level;
  c.buyCostSpan = c.buyBtn.querySelector("[data-buyCost]");
  if(c.buyCostSpan) c.buyCostSpan.textContent = formatMoney(getCost(def, bs.level));

  if(bs.hasManager && c.managerBtn){
    c.managerBtn.classList.add("owned");
    c.managerBtn.disabled = true;
    c.managerBtn.innerHTML = "\u2705 Manager";
  }
}

function updateButtons(){
  for(var i = 0; i < BUSINESSES.length; i++){
    var b = BUSINESSES[i];
    var bs = getBizState(b.id);
    var c = cards[b.id];
    if(!c) continue;
    var cost = getCost(b, bs.level);
    if(c.buyBtn) c.buyBtn.disabled = state.money < cost;
    if(c.runBtn){
      c.runBtn.disabled = bs.level <= 0 || (bs.running && b.id !== "codebot");
      if(b.id === "codebot") c.runBtn.disabled = bs.level <= 0;
    }
    if(c.managerBtn && !bs.hasManager){
      c.managerBtn.disabled = state.money < b.managerCost || bs.level === 0;
    }
  }
}

function spawnFloatText(x, y, text){
  var el = document.createElement("div");
  el.className = "float-text";
  el.textContent = text;
  el.style.left = x + "px";
  el.style.top = y + "px";
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 900);
}

var toastTimeout;
function showToast(msg){
  var t = document.querySelector(".toast");
  if(t) t.remove();
  t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(function(){ t.remove(); }, 2000);
}

function checkWin(){
  if(!state.won && state.lifetimeMoney >= WIN_AMOUNT){
    state.won = true;
    saveGame();
    showWinScreen();
  }
}

function showWinScreen(){
  var overlay = document.createElement("div");
  overlay.className = "win-overlay";
  overlay.innerHTML =
    '<h2>\u{1F389} You Did It!</h2>' +
    '<p>Your AI empire earned ' + formatMoney(state.lifetimeMoney) + ' in total revenue.<br>You\'ve achieved Artificial General Intelligence!</p>' +
    '<button class="btn btn-buy" id="keepBtn" style="font-size:1rem;padding:12px 28px">Keep Playing</button>' +
    '<br><br>' +
    '<button class="btn btn-manager" id="resetBtn" style="font-size:.85rem;padding:10px 20px">\u{1F504} Reset &amp; Play Again</button>';
  document.body.appendChild(overlay);
  document.getElementById("keepBtn").addEventListener("click", function(){ overlay.remove(); });
  document.getElementById("resetBtn").addEventListener("click", function(){
    localStorage.removeItem("aiStartupTycoon");
    location.reload();
  });
}

var lastTick = performance.now();

function gameTick(now){
  var dt = now - lastTick;
  lastTick = now;

  for(var i = 0; i < BUSINESSES.length; i++){
    var b = BUSINESSES[i];
    var bs = getBizState(b.id);
    var c = cards[b.id];
    if(!c) continue;

    if(bs.level > 0 && bs.running){
      var cycleTime = getCycleTime(b, bs.level);
      bs.progress += dt;

      if(bs.progress >= cycleTime){
        collectIncome(b.id);
        bs.progress = bs.hasManager ? bs.progress - cycleTime : 0;
        if(!bs.hasManager){
          bs.running = false;
          c.progressBar.className = "progress-bar idle";
          c.progressBar.style.width = "0%";
        }
      }

      if(bs.running){
        var pct = Math.min((bs.progress / cycleTime) * 100, 100);
        c.progressBar.style.width = pct + "%";
        c.progressBar.className = "progress-bar running";
      }
    }
  }

  totalMoneyEl.textContent = formatMoney(state.money);
  perSecEl.textContent = formatMoney(getTotalPerSec()) + "/s";
  lifetimeEl.textContent = formatMoney(state.lifetimeMoney);

  updateButtons();
  checkWin();
  requestAnimationFrame(gameTick);
}

function init(){
  loadGame();
  buildUI();
  updateButtons();

  for(var i = 0; i < BUSINESSES.length; i++){
    var bs = getBizState(BUSINESSES[i].id);
    if(bs.hasManager && bs.level > 0){ bs.running = true; bs.progress = 0; }
    refreshCard(BUSINESSES[i].id);
  }

  lastTick = performance.now();
  requestAnimationFrame(gameTick);
  setInterval(saveGame, 5000);
  if(state.won) showWinScreen();
}

document.addEventListener("click", function(e){
  var runBtn = e.target.closest("[data-run]");
  if(!runBtn) return;
  var card = runBtn.closest(".business-card");
  if(!card) return;
  var id = card.getAttribute("data-id");
  if(id === "codebot"){
    var bs = getBizState("codebot");
    var def = getBizDef("codebot");
    if(bs.level > 0){
      if(!bs.running){ bs.running = true; bs.progress = 0; }
      var inc = getIncome(def, bs.level);
      state.money += inc;
      state.lifetimeMoney += inc;
      spawnFloatText(e.clientX, e.clientY, "+" + formatMoney(inc));
    }
  }
});

init();

})();
</script>
</body>
</html>
